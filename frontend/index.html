<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Theme: defaults to DARK (:root has dark tokens). Adds .light only when user chose light.
         Must stay in sync with src/hooks/useDarkMode.ts (localStorage key "vt-theme"). -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("vt-theme");
          if (saved === "light") document.documentElement.classList.add("light");
        } catch (e) {}
      })();
    </script>
    <title>Vibe-Trading — vibe trading with your professional financial agent team</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <meta name="description" content="Vibe-Trading — vibe trading with your professional financial agent team. Natural-language finance research, backtesting, swarm workflows, document reading, and multi-market analysis." />
  </head>
  <body class="min-h-screen bg-background text-foreground antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
